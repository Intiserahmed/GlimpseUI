name: "Settings - View Wi-Fi Networks"
platform: ios
app: com.apple.Preferences

steps:
  - task: "Open the Settings app"
  - assert: "Settings app is open"

  - task: "Tap on Wi-Fi"
  - assert: "The Wi-Fi settings screen is open"

  - task: "Toggle Wi-Fi off"
  - assert: "Wi-Fi is now turned off"

  - task: "Toggle Wi-Fi back on"
  - assert: "Wi-Fi is turned on and available networks list is visible or loading"
